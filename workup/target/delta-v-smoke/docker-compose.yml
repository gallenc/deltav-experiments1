---
# Delta-V: OpenNMS microservice-mode deployment (18 services)
# db-init (schema migration, runs once) + Webapp + Minion
# + Alarmd + Pollerd + Collectd
# + Discovery + Trapd + Syslogd + EventTranslator + Enlinkd
# + Provisiond + Bsmd + PerspectivePollerd + Telemetryd
#
# Images: Each daemon has its own image (${IMAGE_PREFIX}/<daemon>:${VERSION})
# built from a shared daemon-base layer. Build with: ./build.sh deltav
# Per-service config overlays remain as local bind mounts.
#
# To use GHCR images, set in .env:
#   IMAGE_PREFIX=ghcr.io/mhuot
#
# Usage:
#   docker compose up -d
#   docker compose ps        # wait for all services to be healthy
#   open http://localhost:8980/opennms  (admin/admin)
#
# DNS hygiene: every service merges the `no-search-domain` anchor below.
# Docker copies the host's /etc/resolv.conf `search` directive into each
# container's resolver, which causes bare-name lookups (e.g. `minion-gateway`)
# to first try `minion-gateway.<host-search-domain>` against the operator's
# upstream DNS. When that DNS flakes (typical of home-network DHCP-assigned
# resolvers), Envoy's STRICT_DNS poller stalls and both Minion data flows pause
# in lockstep. Setting `dns_search: "."` (the DNS root) per service tells
# Docker to override the inherited search list; the container's resolver then
# uses only Docker's embedded resolver (127.0.0.11) for in-network names,
# eliminating the host's flaky upstream from the path. Apply via YAML merge:
# every service starts with `<<: *no-search-domain`.
#
# Empirically verified: `dns_search: []` is treated by Docker as "no override"
# (same as omitting). `dns_search: "."` produces `Overrides: [search]` in the
# container resolv.conf metadata, confirming the override took effect.

x-no-search-domain: &no-search-domain
  dns_search: "."

services:

  postgres:
    <<: *no-search-domain
    image: postgres:15
    command: ["-c", "max_connections=350"]
    environment:
      POSTGRES_DB: opennms
      POSTGRES_USER: opennms
      POSTGRES_PASSWORD: opennms
      POSTGRES_HOST_AUTH_METHOD: md5
      POSTGRES_INITDB_ARGS: --auth=md5
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U opennms -d opennms"]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    <<: *no-search-domain
    image: apache/kafka:latest
    environment:
      KAFKA_NODE_ID: "1"
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://:9092,EXTERNAL://:19092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,EXTERNAL://${KAFKA_EXTERNAL_HOST:-localhost}:19092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_NUM_PARTITIONS: "4"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: "1"
      CLUSTER_ID: "delta-v-kafka-cluster"
      KAFKA_HEAP_OPTS: "-Xms512m -Xmx1g"
      KAFKA_LOG_RETENTION_MS: "3600000"
      KAFKA_LOG_RETENTION_CHECK_INTERVAL_MS: "300000"
    ports:
      - "19092:19092"
    volumes:
      - kafkadata:/tmp/kraft-combined-logs
    healthcheck:
      # Use lightweight TCP probe instead of kafka-topics.sh (which starts a full JVM)
      test: ["CMD-SHELL", "nc -z localhost 9092"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  # Database schema initialization — standalone Spring Boot app that runs
  # Liquibase migrations, then exits. All services that need PostgreSQL
  # should depend on this with condition: service_completed_successfully.
  db-init:
    <<: *no-search-domain
    image: ${IMAGE_PREFIX:-deltav}/db-init:${VERSION}
    container_name: delta-v-db-init
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      OPENNMS_DBINIT_ADMIN_URL: jdbc:postgresql://postgres:5432/template1
      OPENNMS_DBINIT_ADMIN_USER: opennms
      OPENNMS_DBINIT_ADMIN_PASSWORD: opennms
      OPENNMS_DBINIT_DATABASE_NAME: opennms
      OPENNMS_DBINIT_DATABASE_USER: opennms
      OPENNMS_DBINIT_DATABASE_PASSWORD: opennms
      OPENNMS_DBINIT_CREATE_USER: "false"
      JAVA_TOOL_OPTIONS: -Xms256m -Xmx512m

  snmp-agent:
    <<: *no-search-domain
    image: ${IMAGE_PREFIX:-deltav}/mock-snmp-agent:${VERSION}
    container_name: delta-v-snmp-agent
    hostname: snmp-agent
    # Pinned IP so the rpc-canary requisition can target a stable address.
    # The requisition (provisiond-overlay/etc/imports-seed/rpc-canary.xml)
    # hard-codes 172.18.0.2; before the ip_range was added this service
    # happened to receive .0.2 from the dynamic allocator, but ip_range now
    # confines dynamic allocation to 172.18.1.0/24, so it must be pinned.
    networks:
      default:
        ipv4_address: 172.18.0.2
    healthcheck:
      test: ["CMD-SHELL", "true"]
      interval: 10s
      retries: 3

  nl6:
    <<: *no-search-domain
    # Upstream simulator image. The project was renamed from
    # labmonkeys-space/l8opensim to labmonkeys-space/nl6 in May 2026.
    # v0.9.1 release notes: https://github.com/labmonkeys-space/nl6/releases/tag/v0.9.1
    image: ghcr.io/labmonkeys-space/nl6@sha256:26738adbef8e091df66b29dfb4fce426ddd19973c5695e7069577b093a3de53e  # v0.9.1
    container_name: delta-v-nl6
    profiles: [active, full, metrics, demo]
    cap_add:
      - NET_ADMIN
      - SYS_ADMIN
    devices:
      - /dev/net/tun
    # Start with no devices; the provisioner POSTs the 20-device mix from
    # ./nl6/devices.json after this service is healthy.
    # `-no-namespace` mode keeps the per-device TUN interfaces in this
    # container's root netns so minion-lab (which shares the netns) can
    # reach the device IPs at 10.0.0.1-20 directly.
    # `-flow-protocol ipfix -flow-collector 127.0.0.1:4729`: nl6's flow
    # config is process-wide (no per-device REST API), so all 20 devices emit
    # IPFIX to the loopback minion-lab listener. Together with the test-node
    # containers at Default location (NetFlow v5/v9 + sFlow), all 4 flow
    # protocols reach the Minion dispatcher and exercise all flow-enricher
    # parser paths.
    # `-flow-source-per-device` makes each simulated device send flow packets
    # from its own TUN-interface IP (10.0.0.1-20) instead of all flows
    # appearing to come from one process source IP (127.0.0.1). This gives
    # provisiond the correct per-device exporter IP for foreign-source /
    # foreign-id attribution in the Grafana flow sources inventory.
    # Collector on 127.0.0.2 (not 127.0.0.1) so the aggregate exporter node in
    # the nl6-lab requisition has a unique loopback address that doesn't
    # collide with delta-v/localhost (also at 127.0.0.1). Linux loopback covers
    # 127.0.0.0/8 — minion-lab listens on 0.0.0.0:4729 in the shared netns and
    # receives packets to any 127.x.x.x address.
    command: ["-no-namespace", "-flow-protocol", "ipfix", "-flow-collector", "127.0.0.2:4729", "-flow-source-per-device"]
    healthcheck:
      # 127.0.0.1 not localhost — BusyBox wget IPv6 quirk per delta-v#182.
      test: ["CMD", "wget", "-q", "-O-", "http://127.0.0.1:8080/health"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 5s
    ports:
      - "19161:161/udp"  # ad-hoc SNMP testing from the host
      - "19081:8080/tcp" # web UI + REST API
    # Pinned IP so the perspective-smoke requisition can target a stable
    # address. Default Minion routes via the Docker bridge to reach this;
    # the nl6-lab Minion shares this netns so it sees 172.18.0.30 as
    # one of its own interfaces (the "perspective" comes from the polling
    # daemon's RPC dispatch, not the network path).
    networks:
      default:
        ipv4_address: 172.18.0.30

  nl6-provisioner:
    <<: *no-search-domain
    image: ${IMAGE_PREFIX:-deltav}/nl6-provisioner:${VERSION}
    container_name: delta-v-nl6-provisioner
    profiles: [active, full, metrics, demo]
    depends_on:
      nl6:
        condition: service_healthy
    network_mode: "container:delta-v-nl6"
    restart: "no"
    entrypoint: ["sh", "-c"]
    command:
      - |
        set -eu
        # Derive expected count from devices.json so adding a 21st entry
        # doesn't silently break the verifier. Symmetric error handling
        # with the count= block below: friendly FAIL if devices.json is
        # unreadable/malformed, and reject null/empty/zero before the
        # integer compare so busybox `[` doesn't error out raw.
        expected=$$(jq '[.[].device_count] | add' /seed/devices.json 2>/dev/null) || {
            echo "FAIL could not parse /seed/devices.json"; exit 1;
        }
        case "$$expected" in
            ''|null|0) echo "FAIL /seed/devices.json yields no devices (expected=$$expected)"; exit 1 ;;
        esac
        echo "provisioner: importing $$expected-device seed via upstream fleet.sh"
        # devices.json is a batch-manifest array; fleet.sh import
        # auto-detects the shape and POSTs each entry to /api/v1/devices.
        sh /seed/fleet.sh import http://127.0.0.1:8080 /seed/devices.json
        # Verify exact count. Match fleet.sh's shape hedging so a future
        # response envelope change ({data:[]}, {devices:[]}, or bare array)
        # doesn't silently null-out the count.
        body=$$(curl -sf http://127.0.0.1:8080/api/v1/devices) || {
            echo "FAIL could not GET /api/v1/devices for verification"; exit 1;
        }
        count=$$(printf '%s' "$$body" | jq '(.data // .devices // (if type=="array" then . else [] end)) | length' 2>/dev/null) || {
            echo "FAIL could not parse /api/v1/devices response: $$body"; exit 1;
        }
        # Coerce empty/null to 0 so busybox `[` doesn't error out before
        # the friendly FAIL message can run.
        case "$$count" in ''|null) count=0 ;; esac
        echo "provisioner: nl6 now reports $$count devices (expected $$expected)"
        [ "$$count" -eq "$$expected" ] || { echo "FAIL expected $$expected devices got $$count"; exit 1; }

  # gRPC-to-Kafka translator for the Minion-facing surface (Heartbeat in rc1;
  # Sink/RPC channels follow in v1.3). Sole inbound surface for Minions per
  # the bidirectional zero-trust posture (project_minion_mandatory).
  minion-gateway:
    <<: *no-search-domain
    image: ${IMAGE_PREFIX:-deltav}/minion-gateway:${VERSION}
    container_name: delta-v-minion-gateway
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      JAVA_OPTS: "-Xms256m -Xmx512m"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health | grep -q UP"]
      interval: 10s
      timeout: 3s
      retries: 6
      start_period: 30s

  # gRPC ingress in front of minion-gateway. h2c plaintext in rc1 (TLS
  # termination is rc2 work). Long-lived bidi stream timeouts disabled
  # per Phase 0 Decision 3.
  envoy:
    <<: *no-search-domain
    image: ${IMAGE_PREFIX:-deltav}/envoy:${VERSION}
    container_name: delta-v-envoy
    depends_on:
      minion-gateway:
        condition: service_healthy
    ports:
      - "8443:8443"            # 8443 published so Minions outside the compose network can reach it
    healthcheck:
      # curl is installed in our envoy image (upstream image strips all HTTP clients)
      test: ["CMD-SHELL", "curl -sf http://localhost:9901/ready | grep -q LIVE"]
      interval: 10s
      timeout: 3s
      retries: 6
      start_period: 10s

  minion:
    <<: *no-search-domain
    image: ${IMAGE_PREFIX:-deltav}/minion-boot:${VERSION}
    container_name: delta-v-minion
    hostname: minion-default-01
    cap_add:
      - NET_RAW
    depends_on:
      envoy:
        condition: service_healthy
    # Stub reverse-DNS entries for the mhuot-labs requisition's 172.20.20.x
    # addresses. Without these, getnameinfo() times out ~20s per interface,
    # serialized through provisiond's scheduler thread → ~100s before any
    # node finishes importing → collectd never schedules → E2E fails at
    # step 4 (records_consumed=0). The lookup may dispatch via RPC to this
    # Minion (the location's closest Minion), so mirror the fix here as well
    # as on provisiond. See memory project_e2e_hostname_resolution_timeout.
    extra_hosts:
      - "mhuot-lab-2:172.20.20.2"
      - "mhuot-lab-3:172.20.20.3"
      - "mhuot-lab-4:172.20.20.4"
      - "mhuot-lab-5:172.20.20.5"
      - "mhuot-lab-6:172.20.20.6"
    environment:
      MINION_ID: minion-default-01
      MINION_LOCATION: Default
      MINION_GATEWAY_HOST: envoy
      MINION_GATEWAY_PORT: 8443
      JAVA_OPTS: >-
        -Xms256m -Xmx512m
        -Djava.security.egd=file:/dev/./urandom
    ports:
      - "8301:8080"           # Actuator (was 8201 Karaf SSH)
      - "11162:1162/udp"      # SNMP Trapd
      - "1514:1514/udp"       # Syslog
      - "4729:4729/udp"       # Flow telemetry (Netflow v5/v9, IPFIX, sFlow)
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/actuator/health | grep -q '\"status\":\"UP\"'"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 15s

  minion-lab:
    <<: *no-search-domain
    image: ${IMAGE_PREFIX:-deltav}/minion-boot:${VERSION}
    container_name: delta-v-minion-lab
    profiles: [active, full, metrics, demo]
    network_mode: "container:delta-v-nl6"
    cap_add:
      - NET_RAW
    depends_on:
      envoy:
        condition: service_healthy
      nl6-provisioner:
        condition: service_completed_successfully
    environment:
      MINION_ID: minion-nl6-lab-01
      MINION_LOCATION: nl6-lab
      # Port-collision avoidance under shared netns: nl6 binds 8080 for
      # its REST API, Minion's actuator defaults to 8080 too. Move Minion's
      # actuator to 8181.
      SERVER_PORT: "8181"
      JAVA_OPTS: >-
        -Xms256m -Xmx512m
        -Djava.security.egd=file:/dev/./urandom
    healthcheck:
      # Healthcheck targets the relocated actuator port (see SERVER_PORT above).
      test: ["CMD-SHELL", "curl -sf http://127.0.0.1:8181/actuator/health | grep -q '\"status\":\"UP\"'"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 15s

  pollerd:
    <<: *no-search-domain
    profiles: [active, full, metrics, demo]
    image: ${IMAGE_PREFIX:-deltav}/pollerd:${VERSION}
    container_name: delta-v-pollerd
    hostname: pollerd
    depends_on:
      db-init:
        condition: service_completed_successfully
      kafka:
        condition: service_healthy
    environment:
      JAVA_OPTS: "-Xms512m -Xmx1g -XX:MaxMetaspaceSize=256m -Dorg.opennms.core.ipc.twin.kafka.bootstrap.servers=kafka:9092 -Dorg.opennms.core.ipc.rpc.force-remote=true"
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/opennms
      SPRING_DATASOURCE_USERNAME: opennms
      SPRING_DATASOURCE_PASSWORD: opennms
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_CONSUMER_GROUP: opennms-pollerd
      OPENNMS_HOME: /opt/deltav
      OPENNMS_INSTANCE_ID: DeltaV
      OPENNMS_TSID_NODE_ID: "4"
      OPENNMS_RPC_KAFKA_ENABLED: "true"
      OPENNMS_RPC_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      # Phase 3 (delta-v#220, v1.2.0-beta2): publish per-poll response-time
      # samples to the deltav-timeseries Kafka topic. Without this,
      # PollerdTimeseriesConfiguration's @ConditionalOnProperty stays inactive
      # and InstrumentedPollContext sees a null ResponseTimePublisher (Phase 2
      # /actuator/prometheus counters still emit; Phase 3 publish is a no-op).
      DELTAV_TIMESERIES_ENABLED: ${DELTAV_TIMESERIES_ENABLED:-true}
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  collectd:
    <<: *no-search-domain
    profiles: [active, full, metrics, demo]
    image: ${IMAGE_PREFIX:-deltav}/collectd:${VERSION}
    container_name: delta-v-collectd
    hostname: collectd
    depends_on:
      db-init:
        condition: service_completed_successfully
      kafka:
        condition: service_healthy
    environment:
      JAVA_OPTS: "-Xms512m -Xmx1g -Dorg.opennms.tsid.node-id=5"
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/opennms
      SPRING_DATASOURCE_USERNAME: opennms
      SPRING_DATASOURCE_PASSWORD: opennms
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      OPENNMS_HOME: /opt/deltav
      # Vestigial — selects the strategy for horizon's stock TimeseriesPersister
      # (the "inner" persister inside FanoutPersister). InMemoryStorage is a
      # black hole in delta-v: nothing reads from it, no Newts, no horizon
      # webapp. The real TSDB path is the parallel Kafka persister
      # (TimeseriesKafkaPersister → deltav-timeseries → prometheus-writer →
      # VictoriaMetrics → Grafana), gated by DELTAV_TIMESERIES_ENABLED below.
      # Removing this line would let horizon fail-fast on missing strategy
      # config; documented in memory project_collectd_inner_persister_inert.
      OPENNMS_TIMESERIES_STRATEGY: inmemory
      DELTAV_TIMESERIES_ENABLED: ${DELTAV_TIMESERIES_ENABLED:-true}
    stop_grace_period: 60s
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  discovery:
    <<: *no-search-domain
    profiles: [passive, full, demo]
    image: ${IMAGE_PREFIX:-deltav}/discovery:${VERSION}
    container_name: delta-v-discovery
    hostname: discovery
    depends_on:
      db-init:
        condition: service_completed_successfully
      kafka:
        condition: service_healthy
    environment:
      JAVA_OPTS: "-Xms256m -Xmx512m -XX:MaxMetaspaceSize=256m"
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/opennms
      SPRING_DATASOURCE_USERNAME: opennms
      SPRING_DATASOURCE_PASSWORD: opennms
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      OPENNMS_HOME: /opt/deltav
      INTERFACE_NODE_CACHE_REFRESH_MS: "15000"
      OPENNMS_INSTANCE_ID: DeltaV
      OPENNMS_TSID_NODE_ID: "24"
      RPC_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      RPC_KAFKA_FORCE_REMOTE: "true"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    stop_grace_period: 60s

  trapd:
    <<: *no-search-domain
    profiles: [passive, full, demo]
    image: ${IMAGE_PREFIX:-deltav}/trapd:${VERSION}
    container_name: delta-v-trapd
    hostname: trapd
    depends_on:
      db-init:
        condition: service_completed_successfully
      kafka:
        condition: service_healthy
    environment:
      JAVA_OPTS: "-Xms256m -Xmx512m -XX:MaxMetaspaceSize=256m"
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/opennms
      SPRING_DATASOURCE_USERNAME: opennms
      SPRING_DATASOURCE_PASSWORD: opennms
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_CONSUMER_GROUP: opennms-trapd
      KAFKA_SINK_CONSUMER_GROUP: opennms-trapd-sink
      OPENNMS_HOME: /opt/deltav
      INTERFACE_NODE_CACHE_REFRESH_MS: "15000"
      OPENNMS_INSTANCE_ID: DeltaV
      OPENNMS_TSID_NODE_ID: "20"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  syslogd:
    <<: *no-search-domain
    profiles: [passive, full, demo]
    image: ${IMAGE_PREFIX:-deltav}/syslogd:${VERSION}
    container_name: delta-v-syslogd
    hostname: syslogd
    depends_on:
      db-init:
        condition: service_completed_successfully
      kafka:
        condition: service_healthy
    environment:
      JAVA_OPTS: "-Xms256m -Xmx512m -XX:MaxMetaspaceSize=256m"
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/opennms
      SPRING_DATASOURCE_USERNAME: opennms
      SPRING_DATASOURCE_PASSWORD: opennms
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_CONSUMER_GROUP: opennms-syslogd
      KAFKA_SINK_CONSUMER_GROUP: opennms-syslogd-sink
      OPENNMS_HOME: /opt/deltav
      INTERFACE_NODE_CACHE_REFRESH_MS: "15000"
      OPENNMS_INSTANCE_ID: DeltaV
      OPENNMS_TSID_NODE_ID: "21"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  eventtranslator:
    <<: *no-search-domain
    profiles: [passive, full, demo]
    image: ${IMAGE_PREFIX:-deltav}/eventtranslator:${VERSION}
    container_name: delta-v-eventtranslator
    hostname: eventtranslator
    depends_on:
      db-init:
        condition: service_completed_successfully
      kafka:
        condition: service_healthy
    environment:
      JAVA_OPTS: "-Xms256m -Xmx512m -XX:MaxMetaspaceSize=256m"
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/opennms
      SPRING_DATASOURCE_USERNAME: opennms
      SPRING_DATASOURCE_PASSWORD: opennms
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_CONSUMER_GROUP: opennms-eventtranslator
      OPENNMS_HOME: /opt/deltav
      OPENNMS_INSTANCE_ID: DeltaV
      OPENNMS_TSID_NODE_ID: "22"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  enlinkd:
    <<: *no-search-domain
    profiles: [full, demo]
    image: ${IMAGE_PREFIX:-deltav}/enlinkd:${VERSION}
    container_name: delta-v-enlinkd
    hostname: enlinkd
    environment:
      JAVA_OPTS: "-Xms256m -Xmx512m -XX:MaxMetaspaceSize=256m -Dopennms.home=/opt/deltav"
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/opennms
      SPRING_DATASOURCE_USERNAME: opennms
      SPRING_DATASOURCE_PASSWORD: opennms
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_CONSUMER_GROUP: enlinkd
      OPENNMS_HOME: /opt/deltav
      OPENNMS_RPC_KAFKA_ENABLED: "true"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    stop_grace_period: 60s
    depends_on:
      db-init:
        condition: service_completed_successfully
      kafka:
        condition: service_healthy

  # One-shot sidecar that seeds the provisiond_imports named volume from the
  # baked requisition seed (see Dockerfile.provisiond-imports-init) on first
  # boot. Runs as root so it can chown the freshly-created named volume to
  # the provisiond runtime uid. When the volume is already populated the
  # sidecar is a no-op.
  #
  # foreign-sources/pending/ is handled entirely inside the provisiond image
  # itself (baked by Dockerfile.daemon-per's `COPY --chown=opennms:opennms`),
  # so there's no host bind mount to chown here anymore.
  provisiond-imports-init:
    <<: *no-search-domain
    profiles: [active, passive, full, metrics, demo]
    image: ${IMAGE_PREFIX:-deltav}/provisiond-imports-init:${VERSION}
    container_name: delta-v-provisiond-imports-init
    user: "0:0"
    volumes:
      - provisiond_imports:/runtime
    command:
      - sh
      - -c
      - |
        set -e
        # Use a marker file, not the emptiness check: when the named volume
        # first mounts into the provisiond container, Docker auto-populates
        # it from provisiond's image content at /opt/deltav/etc/imports
        # (which contains a baked `.gitkeep`). That write happens before
        # this sidecar runs, so an emptiness check was fooled into thinking
        # the volume was already seeded and skipped the actual seed.
        if [ ! -f /runtime/.seeded ]; then
            echo "[provisiond-imports-init] Seeding /runtime from /seed"
            cp -R /seed/. /runtime/
            touch /runtime/.seeded
        else
            echo "[provisiond-imports-init] /runtime already seeded — normalizing perms"
        fi
        # Always normalize ownership AND permissions, regardless of seed state.
        # Pre-existing volumes from earlier compose iterations occasionally end up
        # with the runtime directory at mode 0666 (no execute bit), which silently
        # blocks provisiond's opennms user from listing or writing inside — the
        # cron-driven requisition import then fails with "Permission denied" on
        # every fire (we hit this during PR3 Task 12 labbox testing). Idempotent
        # chmod here makes the init container self-heal both fresh + stale volumes.
        chown -R 100:101 /runtime
        chmod 755 /runtime
        find /runtime -type d -exec chmod 755 {} +
        find /runtime -type f -exec chmod 644 {} +

  provisiond:
    <<: *no-search-domain
    profiles: [active, passive, full, metrics, demo]
    image: ${IMAGE_PREFIX:-deltav}/provisiond:${VERSION}
    container_name: delta-v-provisiond
    hostname: provisiond
    depends_on:
      db-init:
        condition: service_completed_successfully
      kafka:
        condition: service_healthy
      provisiond-imports-init:
        condition: service_completed_successfully
    # Stub reverse-DNS entries for the mhuot-labs requisition's 172.20.20.x
    # addresses — same mirror as on the Minion service above. Provisiond's
    # DnsLookupClientRpcModule has a 4-thread pool that may execute the
    # InetAddress.getCanonicalHostName() locally when no Minion registered
    # at the requisition's location; these entries make that path instant.
    extra_hosts:
      - "mhuot-lab-2:172.20.20.2"
      - "mhuot-lab-3:172.20.20.3"
      - "mhuot-lab-4:172.20.20.4"
      - "mhuot-lab-5:172.20.20.5"
      - "mhuot-lab-6:172.20.20.6"
    environment:
      JAVA_OPTS: "-Xms512m -Xmx1g -XX:MaxMetaspaceSize=256m"
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/opennms
      SPRING_DATASOURCE_USERNAME: opennms
      SPRING_DATASOURCE_PASSWORD: opennms
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      OPENNMS_HOME: /opt/deltav
      OPENNMS_INSTANCE_ID: DeltaV
      OPENNMS_TSID_NODE_ID: "25"
      RPC_KAFKA_ENABLED: "true"
      RPC_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      RPC_KAFKA_FORCE_REMOTE: "true"
    volumes:
      # /opt/deltav/etc is baked into the image (see Dockerfile.daemon-per). The
      # provisiond_imports named volume shadows imports/ so last-import timestamp
      # writes persist across restarts without a host bind mount. With the parent
      # bind mount gone, the macOS VirtioFS nested-mount bug is no longer in play
      # — the named volume mounts cleanly on Linux and macOS alike.
      - provisiond_imports:/opt/deltav/etc/imports
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 12
      # provisiond is the slowest daemon to first-healthy — it runs the
      # requisition import (Hibernate + node scans) on top of Spring Boot init.
      # On a cold start, especially while the host is pulling images, it has
      # been observed taking ~210s. With the default 20s start_period the
      # container flips to `unhealthy` at start_period + retries*interval
      # (20 + 12*10 = 140s), and `docker compose up` then aborts the services
      # that depend_on provisiond (perspective-app-init, perspectivepollerd).
      # 240s keeps failing checks in `starting` through a slow cold start so
      # compose keeps waiting instead of bailing.
      start_period: 240s
    stop_grace_period: 60s

  bsmd:
    <<: *no-search-domain
    profiles: [active, full, metrics, demo]
    image: ${IMAGE_PREFIX:-deltav}/bsmd:${VERSION}
    container_name: delta-v-bsmd
    hostname: bsmd
    depends_on:
      db-init:
        condition: service_completed_successfully
      kafka:
        condition: service_healthy
    environment:
      JAVA_OPTS: "-Xms256m -Xmx512m -XX:MaxMetaspaceSize=256m -Dorg.opennms.alarms.snapshot.sync.ms=10000"
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/opennms
      SPRING_DATASOURCE_USERNAME: opennms
      SPRING_DATASOURCE_PASSWORD: opennms
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_CONSUMER_GROUP: opennms-bsmd
      OPENNMS_HOME: /opt/deltav
      OPENNMS_INSTANCE_ID: DeltaV
      OPENNMS_TSID_NODE_ID: "17"
    ports:
      - "8180:8080"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  # One-shot sidecar that creates the smoke-baseline perspective application
  # (Devices-API-Perspective-App) once provisiond has imported the
  # perspective-smoke requisition. PerspectivePollerd's tracker polls
