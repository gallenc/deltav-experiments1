      db-init:
        condition: service_completed_successfully
      kafka:
        condition: service_healthy
      perspective-app-init:
        condition: service_completed_successfully
    environment:
      JAVA_OPTS: "-Xms512m -Xmx1g -XX:MaxMetaspaceSize=256m -Dorg.opennms.core.ipc.rpc.force-remote=true"
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/opennms
      SPRING_DATASOURCE_USERNAME: opennms
      SPRING_DATASOURCE_PASSWORD: opennms
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_CONSUMER_GROUP: opennms-perspectivepollerd
      OPENNMS_HOME: /opt/deltav
      OPENNMS_INSTANCE_ID: DeltaV
      OPENNMS_TSID_NODE_ID: "7"
      OPENNMS_RPC_KAFKA_ENABLED: "true"
      OPENNMS_RPC_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      # Phase 3: publish per-poll response-time records to deltav-timeseries
      # Kafka topic. Daemon-scoped flag — independent of Pollerd's
      # DELTAV_TIMESERIES_ENABLED so the two can be toggled separately.
      DELTAV_PERSPECTIVE_TIMESERIES_ENABLED: ${DELTAV_PERSPECTIVE_TIMESERIES_ENABLED:-true}
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  alarmd:
    <<: *no-search-domain
    profiles: [active, passive, full, metrics, demo]
    image: ${IMAGE_PREFIX:-deltav}/alarmd:${VERSION}
    container_name: delta-v-alarmd
    hostname: alarmd
    depends_on:
      db-init:
        condition: service_completed_successfully
      kafka:
        condition: service_healthy
    environment:
      JAVA_OPTS: "-Xms512m -Xmx1g -XX:MaxMetaspaceSize=256m"
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/opennms
      SPRING_DATASOURCE_USERNAME: opennms
      SPRING_DATASOURCE_PASSWORD: opennms
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_CONSUMER_GROUP: opennms-alarmd
      OPENNMS_HOME: /opt/deltav
      OPENNMS_INSTANCE_ID: DeltaV
      OPENNMS_TSID_NODE_ID: "23"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  telemetryd:
    <<: *no-search-domain
    profiles: [full, demo]
    image: ${IMAGE_PREFIX:-deltav}/telemetryd:${VERSION}
    container_name: delta-v-telemetryd
    hostname: telemetryd
    depends_on:
      db-init:
        condition: service_completed_successfully
      kafka:
        condition: service_healthy
    environment:
      JAVA_OPTS: "-Xms256m -Xmx512m -XX:MaxMetaspaceSize=256m -Dorg.opennms.core.ipc.sink.kafka.bootstrap.servers=kafka:9092 -Dorg.opennms.core.ipc.sink.kafka.group.id=opennms-telemetryd-sink -Dorg.opennms.core.ipc.twin.kafka.bootstrap.servers=kafka:9092"
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/opennms
      SPRING_DATASOURCE_USERNAME: opennms
      SPRING_DATASOURCE_PASSWORD: opennms
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_CONSUMER_GROUP: opennms-telemetryd
      OPENNMS_HOME: /opt/deltav
      OPENNMS_INSTANCE_ID: DeltaV
      OPENNMS_TSID_NODE_ID: "18"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  clickhouse:
    <<: *no-search-domain
    profiles: [active, full, metrics, demo]
    image: ${IMAGE_PREFIX:-deltav}/clickhouse:${VERSION}
    container_name: delta-v-clickhouse
    hostname: clickhouse
    restart: unless-stopped
    ulimits:
      nofile: { soft: 262144, hard: 262144 }
    environment:
      CLICKHOUSE_DB: deltav
      CLICKHOUSE_USER: deltav
      CLICKHOUSE_PASSWORD: deltav
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    volumes:
      - clickhouse-data:/var/lib/clickhouse
    ports:
      - "8123:8123"
      - "9000:9000"
    depends_on:
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8123/ping"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 15s

  clickhouse-init:
    <<: *no-search-domain
    profiles: [active, full, metrics, demo]
    image: ${IMAGE_PREFIX:-deltav}/clickhouse-init:${VERSION}
    container_name: delta-v-clickhouse-init
    hostname: clickhouse-init
    restart: "no"
    depends_on:
      clickhouse:
        condition: service_healthy
    environment:
      CLICKHOUSE_HOST: clickhouse
      CLICKHOUSE_USER: deltav
      CLICKHOUSE_PASSWORD: deltav
      DELTAV_CLICKHOUSE_FLOWS_RAW_TTL_DAYS: "14"
      DELTAV_CLICKHOUSE_FLOWS_AGG_TTL_DAYS: "90"

  flow-enricher:
    <<: *no-search-domain
    profiles: [active, full, metrics, demo]
    image: ${IMAGE_PREFIX:-deltav}/flow-enricher:${VERSION}
    container_name: delta-v-flow-enricher
    hostname: flow-enricher
    depends_on:
      db-init:
        condition: service_completed_successfully
      kafka:
        condition: service_healthy
    environment:
      JAVA_OPTS: "-Xms256m -Xmx512m -XX:MaxMetaspaceSize=256m"
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/opennms
      SPRING_DATASOURCE_USERNAME: opennms
      SPRING_DATASOURCE_PASSWORD: opennms
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      DELTAV_FLOWS_SINK_TOPICS: "DeltaV.Sink.Telemetry-Netflow-5,DeltaV.Sink.Telemetry-Netflow-9,DeltaV.Sink.Telemetry-IPFIX,DeltaV.Sink.Telemetry-SFlow"
      DELTAV_FLOWS_OUTPUT_TOPIC: deltav-flows
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  flow-default-testnode-1:
    <<: *no-search-domain
    profiles: [active, full, metrics, demo]
    image: ${IMAGE_PREFIX:-deltav}/flow-exporter:${VERSION}
    container_name: flow-default-testnode-1
    hostname: flow-default-testnode-1
    cap_add:
      - NET_RAW
    depends_on:
      minion:
        condition: service_healthy
    environment:
      NETFLOW_COLLECTOR: minion:4729
      NETFLOW_VERSION: "9"
      TRAFFIC_INTERVAL: "5"
    networks:
      default:
        ipv4_address: 172.18.0.21

  flow-sflow-testnode-1:
    <<: *no-search-domain
    profiles: [active, full, metrics, demo]
    image: ${IMAGE_PREFIX:-deltav}/sflow-exporter:${VERSION}
    container_name: flow-sflow-testnode-1
    hostname: flow-sflow-testnode-1
    cap_add:
      - NET_RAW
    depends_on:
      minion:
        condition: service_healthy
    environment:
      SFLOW_COLLECTOR: minion:4729
      # sampling=1 means sample every packet — necessary for a low-traffic
      # test bed. polling=10 emits counter samples every 10s.
      SAMPLING_RATE: "1"
      POLLING_INTERVAL: "10"
      TRAFFIC_INTERVAL: "2"
    networks:
      default:
        ipv4_address: 172.18.0.20

  flow-v5-testnode-1:
    <<: *no-search-domain
    profiles: [active, full, metrics, demo]
    image: ${IMAGE_PREFIX:-deltav}/flow-exporter:${VERSION}
    container_name: flow-v5-testnode-1
    hostname: flow-v5-testnode-1
    cap_add:
      - NET_RAW
    depends_on:
      minion:
        condition: service_healthy
    environment:
      NETFLOW_COLLECTOR: minion:4729
      NETFLOW_VERSION: "5"
      TRAFFIC_INTERVAL: "5"
    networks:
      default:
        ipv4_address: 172.18.0.22

  prometheus-writer:
    <<: *no-search-domain
    image: ${IMAGE_PREFIX:-deltav}/prometheus-writer:${VERSION}
    # Only runs where VictoriaMetrics exists (its remote-write target). NOT in
    # active/full — those have no VM, so it would retry writes against nothing.
    profiles: [metrics, demo]
    depends_on:
      db-init:
        condition: service_completed_successfully
      kafka:
        condition: service_healthy
      provisiond:
        condition: service_started
    environment:
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      PROMETHEUS_WRITER_REMOTE_WRITE_URL: http://victoriametrics:8428/api/v1/write
      JAVA_TOOL_OPTIONS: "-Xms128m -Xmx512m"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/actuator/health/readiness"]
      interval: 10s
      timeout: 5s
      retries: 10
    ports:
      - "18080:8080"

  alertmanager:
    <<: *no-search-domain
    image: prom/alertmanager:v0.27.0
    container_name: delta-v-alertmanager-1
    profiles: [metrics, metrics-e2e, demo]
    command:
      - --config.file=/etc/alertmanager/alertmanager.yml
    configs:
      - source: alertmanager_config
        target: /etc/alertmanager/alertmanager.yml
        mode: 0444
    ports:
      - "9093:9093"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://127.0.0.1:9093/-/healthy | grep -q OK"]
      interval: 10s
      timeout: 3s
      retries: 6
      start_period: 10s

  alerts-forwarder:
    <<: *no-search-domain
    image: ${IMAGE_PREFIX:-deltav}/alerts-forwarder:${VERSION}
    container_name: delta-v-alerts-forwarder-1
    profiles: [metrics, metrics-e2e, demo]
    depends_on:
      kafka:
        condition: service_healthy
      alertmanager:
        condition: service_healthy
    environment:
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      DELTAV_ALERTS_ALERTMANAGER_URL: http://alertmanager:9093/api/v2/alerts
      DELTAV_ALERTS_ALERTMANAGER_ENABLED: "true"
      DELTAV_ALERTS_VM_ENABLED: "true"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # alarms-materializer: consumes the deltav-alarms-state-change Kafka topic
  # (published by alarmd) and materializes the current-alarm view into
  # PostgreSQL `alarms` rows, applying retention rules (cleared/idle GC) that
  # used to live in horizon Drools. UI queries Postgres directly for the
  # current-alarm grid; no horizon Vaadin/REST path involved.
  alarms-materializer:
    <<: *no-search-domain
    profiles: [active, passive, full, metrics, demo]
    image: ${IMAGE_PREFIX:-deltav}/alarms-materializer:${VERSION}
    container_name: delta-v-alarms-materializer
    hostname: alarms-materializer
    depends_on:
      db-init:
        condition: service_completed_successfully
      kafka:
        condition: service_healthy
    environment:
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/opennms
      SPRING_DATASOURCE_USERNAME: opennms
      SPRING_DATASOURCE_PASSWORD: opennms
      DELTAV_ALARMS_STATE_TOPIC: deltav-alarms-state-change
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  victoriametrics:
    <<: *no-search-domain
    image: victoriametrics/victoria-metrics:v1.106.1
    profiles: [metrics, metrics-e2e, demo]
    command:
      # VM v1.106.1 rejects retentionPeriod smaller than 1 day; "1h" causes
      # exit code 255 at startup with fatal log:
      #   -retentionPeriod cannot be smaller than a day; got 1h
      # E2E only needs a few minutes of retention, but the floor is 1d.
      - "-retentionPeriod=1d"
      - "-storageDataPath=/tmp/vm"
      - "-search.latencyOffset=1s"
    healthcheck:
      # Use 127.0.0.1 — BusyBox wget resolves "localhost" to ::1 first, but
      # VM listens on 0.0.0.0:8428 (IPv4 only), so localhost fails Connection
      # refused. 127.0.0.1 forces IPv4 and matches the listening socket.
      test: ["CMD", "wget", "-q", "-O-", "http://127.0.0.1:8428/health"]
      interval: 5s
      timeout: 3s
      retries: 10
    ports:
      - "18428:8428"

  # Scrape sidecar: pulls deltav_* metrics from all daemon /actuator/prometheus
  # endpoints and remote-writes them into VictoriaMetrics so the Grafana
  # alerts-pipeline dashboard has data. Without this, VM runs in receiver-only
  # mode and daemon Micrometer metrics never appear.
  vmagent:
    <<: *no-search-domain
    image: victoriametrics/vmagent:v1.106.1
    container_name: delta-v-vmagent-1
    profiles: [metrics, metrics-e2e, demo]
    restart: unless-stopped
    depends_on:
      victoriametrics:
        condition: service_started
    command:
      - -promscrape.config=/etc/vmagent/scrape.yml
      - -remoteWrite.url=http://victoriametrics:8428/api/v1/write
    configs:
      - source: vmagent_scrape
        target: /etc/vmagent/scrape.yml
        mode: 0444

  grafana:
    <<: *no-search-domain
    image: ${IMAGE_PREFIX:-deltav}/grafana:${VERSION}
    profiles: [metrics, metrics-e2e, demo]
    container_name: delta-v-grafana
    hostname: grafana
    depends_on:
      victoriametrics:
        condition: service_healthy
    environment:
      # Anonymous read-only access for demo. Anyone hitting localhost:13000 lands
      # in the Viewer role without login. Disable by setting GF_AUTH_ANONYMOUS_ENABLED=false.
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: "Viewer"
      # Admin password override. Default 'admin' is fine for the demo stack.
      GF_SECURITY_ADMIN_PASSWORD: ${GF_ADMIN_PASSWORD:-admin}
      # Disable telemetry phone-home and update checks — this is a demo container.
      GF_ANALYTICS_REPORTING_ENABLED: "false"
      GF_ANALYTICS_CHECK_FOR_UPDATES: "false"
      # Auto-install grafana-clickhouse-datasource plugin on first boot.
      # First-boot ~10-15s download; subsequent boots cache in the grafana volume.
      # Healthcheck start_period may need to bump to 60s if Task 7 measurement
      # shows races with readiness — defer to that task's verification gate.
      GF_INSTALL_PLUGINS: grafana-clickhouse-datasource
    volumes:
      - grafanadata:/var/lib/grafana
    healthcheck:
      # Use 127.0.0.1 (not localhost) — BusyBox wget in the Grafana base
      # image resolves localhost to ::1 first, but Grafana listens on IPv4 by
      # default. Same fix as the victoriametrics healthcheck above.
      # The grep pattern uses "database.*ok" because Grafana's JSON response
      # is pretty-printed with a space after the colon ("database": "ok"),
      # not the compact form expected by some other Grafana healthcheck examples.
      test: ["CMD-SHELL", "wget -q -O- http://127.0.0.1:3000/api/health | grep -q 'database.*ok'"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 10s
    ports:
      - "13000:3000"

configs:
  # Alertmanager routing config — embedded here so no host file is required on
  # no-git-clone smoke deployments (fixes Bug #39: Docker was creating a
  # directory at ./alertmanager/alertmanager.yml when the path was missing,
  # causing "not a directory" failures in the alertmanager container).
  alertmanager_config:
    content: |
      route:
        receiver: deltav-null
        group_by: ['node']
      receivers:
        - name: deltav-null
  # vmagent scrape config — enumerates all daemon actuator endpoints so
  # deltav_* Micrometer metrics reach VictoriaMetrics and the Grafana
  # alerts-pipeline dashboard shows data instead of "No data".
  vmagent_scrape:
    content: |
      global:
        scrape_interval: 15s
      scrape_configs:
        - job_name: deltav-daemons
          metrics_path: /actuator/prometheus
          static_configs:
            - targets:
                - alarmd:8080
                - alerts-forwarder:8080
                - bsmd:8080
                - collectd:8080
                - discovery:8080
                - enlinkd:8080
                - eventtranslator:8080
                - perspectivepollerd:8080
                - pollerd:8080
                - provisiond:8080
                - syslogd:8080
                - telemetryd:8080
                - trapd:8080
                - prometheus-writer:8080
                - flow-enricher:8080
                - minion-gateway:8080

volumes:
  pgdata:
  kafkadata:
  collectd-data:
  clickhouse-data:
  grafanadata:
  # Holds provisiond's requisition XML at /opt/deltav/etc/imports/. The
  # provisiond-imports-init sidecar copies provisiond-overlay/etc/imports-seed/
  # into this volume on first start; subsequent mutations (last-import
  # timestamps, runtime edits) persist here across container restarts
  # without touching the host working tree.
  provisiond_imports:

networks:
  # Explicit subnet so the test-node containers can be pinned to predictable
  # IPs that match the foreign-source/foreign-id assignments in the
  # flow-test requisition. Without this, Docker assigns IPs from an
  # auto-generated subnet in arrival order, which means the requisition's
  # static IP-to-node mapping fails to attribute flows correctly in the
  # Grafana flow sources inventory panel. Subnet matches the historical
  # Docker default (172.18.0.0/16) so existing services aren't disturbed.
  #
  # ip_range confines DYNAMIC allocation to 172.18.1.0/24, keeping it clear
  # of the static ipv4_address pins in 172.18.0.x (snmp-agent .2, flow test
  # nodes .20-.22, nl6 .30). Without this, in a large-profile bring-up
  # the dynamic allocator marches up from .2 and can hand a static-pinned IP
  # to another container before the pinned service starts, failing it with
  # "failed to set up container networking: Address already in use".
  default:
    name: delta-v_default
    ipam:
      driver: default
      config:
        - subnet: 172.18.0.0/16
          ip_range: 172.18.1.0/24
          gateway: 172.18.0.1
