---
# Delta-V: OpenNMS microservice-mode deployment NGINX proxy configuration

networks:
     # Explicit subnet so the test-node containers can be pinned to predictable
     # IPs that match the foreign-source/foreign-id assignments in the
     # flow-test requisition. Without this, Docker assigns IPs from an
     # auto-generated subnet in arrival order, which means the requisition's
     # static IP-to-node mapping fails to attribute flows correctly in the
     # Grafana flow sources inventory panel. Subnet matches the historical
     # Docker default (172.18.0.0/16) so existing services aren't disturbed.
     #
     # ip_range confines DYNAMIC allocation to 172.18.1.0/24, keeping it clear
     # of the static ipv4_address pins in 172.18.0.x (snmp-agent .2, flow test
     # nodes .20-.22, nl6 .30). Without this, in a large-profile bring-up
     # the dynamic allocator marches up from .2 and can hand a static-pinned IP
     # to another container before the pinned service starts, failing it with
     # "failed to set up container networking: Address already in use".
     default:
       name: delta-v_default
       ipam:
         driver: default
         config:
           - subnet: 172.18.0.0/16
             ip_range: 172.18.1.0/24
             gateway: 172.18.0.1
             
volumes:
   # vhost:
   conf: {}
   html: {}
   certs: {}
   acme: {}
   
   data-pgadmin: {}

services:

    nginx:
      restart: always
      image: nginx:alpine
      container_name: nginx
      ports:
        - "80:80"
        - "443:443"
      volumes:
        # The vhost volume is only required if you
        # plan to obtain standalone certificates
        # - vhost:/etc/nginx/vhost.d
        # - html:/usr/share/nginx/html
        #- certs:/etc/nginx/certs:ro
        - conf:/etc/nginx/conf.d
        - ../../container-fs/nginx/vhost.d:/etc/nginx/vhost.d
        - ../../container-fs/nginx/html/index.html:/usr/share/nginx/html/index.html
        - ../../container-fs/acme-companion/certs:/etc/nginx/certs:ro
        
      environment:
        - VIRTUAL_HOST=${API_VIRTUAL_HOST:-localhost}
        - VIRTUAL_NETWORK=delta-v_default
        - VIRTUAL_PATH=/
        - VIRTUAL_DEST=/
        - VIRTUAL_PORT=80
      labels: 
          # see https://github.com/nginx-proxy/nginx-proxy/blob/main/docs/README.md#network-segregation
          - "com.github.nginx-proxy.nginx-proxy.nginx"
      networks:
        default:
          ipv4_address: 172.18.0.5

    nginx-gen:
      restart: always
      image: nginxproxy/docker-gen
      container_name: nginx-gen
      volumes:
        - "/var/run/docker.sock:/tmp/docker.sock:ro"
        - "../../container-fs/nginx-gen/templates/nginx.tmpl:/etc/docker-gen/templates/nginx.tmpl:ro"
      volumes_from:
        - nginx
      command: -notify-sighup nginx -watch -wait 5s:30s /etc/docker-gen/templates/nginx.tmpl /etc/nginx/conf.d/default.conf

    acme-companion:
      restart: always
      image: nginxproxy/acme-companion
      container_name: acme-companion
      volumes_from:
        - nginx
      volumes:
        - "../../container-fs/acme-companion/certs:/etc/nginx/certs:rw"
        #- certs:/etc/nginx/certs:rw
        - acme:/etc/acme.sh
        - /var/run/docker.sock:/var/run/docker.sock:ro
      environment:
        - DEFAULT_EMAIL=${ENV_LETSENCRYPT_EMAIL:-email@example.com}
        - NGINX_DOCKER_GEN_CONTAINER=nginx-gen
        # - ACME_CA_URI=https://acme-v02.api.letsencrypt.org/directory # production
        - ACME_CA_URI=https://acme-staging-v02.api.letsencrypt.org/directory # staging
      networks:
          default:
            ipv4_address: 172.18.0.6
            
    pgadmin:
      image: dpage/pgadmin4
      container_name: pgadmin
      restart: always
      ports:
         - "8888:80"
      environment:
        - PGADMIN_DEFAULT_EMAIL=user-name@domain-name.com
        - PGADMIN_DEFAULT_PASSWORD=minad1234
        - PGADMIN_SERVER_JSON_FILE=/pgadmin/servers.json
        - SCRIPT_NAME=/pgadmin
        
        - VIRTUAL_HOST=${API_VIRTUAL_HOST:-localhost}
        - VIRTUAL_NETWORK=delta-v_default
        - VIRTUAL_PATH=/pgadmin/
        - VIRTUAL_DEST=/pgadmin/
        - VIRTUAL_PORT=80
        - LETSENCRYPT_HOST=${ENV_LETSENCRYPT_HOST:-localhost}
        - LETSENCRYPT_EMAIL=${ENV_LETSENCRYPT_EMAIL:-email@example.com}
      volumes:
       - data-pgadmin:/var/lib/pgadmin
       - ./container-fs/pgadmin/:/pgadmin
      networks:
         default:
         
    kafka-ui:
      image: provectuslabs/kafka-ui:${KAFKA_UI_VERSION:-latest}
      container_name: kafka-ui
      hostname: kafka-ui
      depends_on:
        kafka:
          condition: service_started
      environment:
        - TZ=${TIMEZONE:-America/New_York}
        - KAFKA_CLUSTERS_0_NAME=delta-v-kafka-cluster
        - KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS=kafka:9092
        - KAFKA_CLUSTERS_0_ZOOKEEPER=zookeeper:2181
        - SERVER_SERVLET_CONTEXT_PATH=/kafka-ui
        - AUTH_TYPE="LOGIN_FORM"
        - SPRING_SECURITY_USER_NAME=admin
        - SPRING_SECURITY_USER_PASSWORD=minad1234
        
        - VIRTUAL_HOST=${API_VIRTUAL_HOST:-localhost}
        - VIRTUAL_NETWORK=delta-v_default
        - VIRTUAL_PATH=/kafka-ui/
        - VIRTUAL_DEST=/kafka-ui/
        - VIRTUAL_PORT=8080
        - LETSENCRYPT_HOST=${ENV_LETSENCRYPT_HOST:-localhost}
        - LETSENCRYPT_EMAIL=${ENV_LETSENCRYPT_EMAIL:-email@example.com}
      ports:
        - "28080:8080/tcp"
      networks:
         default:

    nl6:
      ## needs some work not returning all values correctly
      environment:
        - VIRTUAL_HOST=${API_VIRTUAL_HOST:-localhost}
        - VIRTUAL_NETWORK=delta-v_default
        - VIRTUAL_PATH=/web/
        - VIRTUAL_DEST=/web/
        - VIRTUAL_PORT=8080
        - LETSENCRYPT_HOST=${ENV_LETSENCRYPT_HOST:-localhost}
        - LETSENCRYPT_EMAIL=${ENV_LETSENCRYPT_EMAIL:-email@example.com}
#    ports:
#      - "19161:161/udp"  # ad-hoc SNMP testing from the host
#      - "19081:8080/tcp" # web UI + REST API
    # Pinned IP so the perspective-smoke requisition can target a stable
    # address. Default Minion routes via the Docker bridge to reach this;
    # the nl6-lab Minion shares this netns so it sees 172.18.0.30 as
    # one of its own interfaces (the "perspective" comes from the polling
    # daemon's RPC dispatch, not the network path).
#    networks:
#      default:
#        ipv4_address: 172.18.0.30

 

    victoriametrics:
      environment:
        - VIRTUAL_HOST=${API_VIRTUAL_HOST:-localhost}
        - VIRTUAL_NETWORK=delta-v_default
        - VIRTUAL_PATH=/victoriametrics/
        - VIRTUAL_DEST=/
        - VIRTUAL_PORT=8428
        - LETSENCRYPT_HOST=${ENV_LETSENCRYPT_HOST:-localhost}
        - LETSENCRYPT_EMAIL=${ENV_LETSENCRYPT_EMAIL:-email@example.com}

#    ports:
#      - "18428:8428"


    grafana:
      environment:
        
        - GF_SERVER_HTTP_PORT=3000
        - GF_SERVER_PROTOCOL=http
        - GF_SERVER_DOMAIN=${API_VIRTUAL_HOST:-localhost}:80
        - GF_SERVER_ROOT_URL=http://${API_VIRTUAL_HOST:-localhost}:80/grafana/
        - GF_SERVER_SERVER_FROM_SUB_PATH=true

        - VIRTUAL_HOST=${API_VIRTUAL_HOST:-localhost}
        - VIRTUAL_NETWORK=delta-v_default
        - VIRTUAL_PATH=/grafana/
        - VIRTUAL_DEST=/
        - VIRTUAL_PORT=3000
        - LETSENCRYPT_HOST=${ENV_LETSENCRYPT_HOST:-localhost}
        - LETSENCRYPT_EMAIL=${ENV_LETSENCRYPT_EMAIL:-email@example.com}
#     ports:
#      - "13000:3000"
